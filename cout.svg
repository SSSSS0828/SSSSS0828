<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 1040 50'
    style='background-color: #00000000;'
    width='1040px' height='50px'>

    <style>
@font-face {
  font-family: 'Fira Code';
  font-style: normal;
  font-weight: 400;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s;d5.end'
                    dur='4800ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h1040 ; m0,25 h1040 ; m0,25 h0' keyTimes='0;0.46666666666667;0.88333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#A9FEF7' font-size='50'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            sout(&quot;Hello, World!&quot;)
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Single line -->
                                <animate id='d1' attributeName='d' begin='d0.end'
                    dur='4800ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h1040 ; m0,25 h1040 ; m0,25 h0' keyTimes='0;0.46666666666667;0.88333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#A9FEF7' font-size='50'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path1'>
            cout&lt;&lt;(&quot;Hello, World!&quot;)&lt;&lt;endl
        </textPath>
    </text>
        <path id='path2'>
                            <!-- Single line -->
                                <animate id='d2' attributeName='d' begin='d1.end'
                    dur='4800ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h1040 ; m0,25 h1040 ; m0,25 h0' keyTimes='0;0.46666666666667;0.88333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#A9FEF7' font-size='50'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path2'>
            console.log(&quot;Hello, World!&quot;)
        </textPath>
    </text>
        <path id='path3'>
                            <!-- Single line -->
                                <animate id='d3' attributeName='d' begin='d2.end'
                    dur='4800ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h1040 ; m0,25 h1040 ; m0,25 h0' keyTimes='0;0.46666666666667;0.88333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#A9FEF7' font-size='50'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path3'>
            print(&quot;Hello, World!&quot;)
        </textPath>
    </text>
        <path id='path4'>
                            <!-- Single line -->
                                <animate id='d4' attributeName='d' begin='d3.end'
                    dur='4800ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h1040 ; m0,25 h1040 ; m0,25 h0' keyTimes='0;0.46666666666667;0.88333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#A9FEF7' font-size='50'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path4'>
            fmt.Println(&quot;Hello, World!&quot;)
        </textPath>
    </text>
        <path id='path5'>
                            <!-- Single line -->
                                <animate id='d5' attributeName='d' begin='d4.end'
                    dur='4800ms' fill='remove'
                    values='m0,25 h0 ; m0,25 h1040 ; m0,25 h1040 ; m0,25 h0' keyTimes='0;0.46666666666667;0.88333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#A9FEF7' font-size='50'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path5'>
            printf(&quot;Hello, World!&quot;)
        </textPath>
    </text>
</svg>
